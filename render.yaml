services:
  - name: bookit
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/chideraezeudu2-sudo/bookit
    branch: master
    rootDir: ""
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PORT
        value: 3000
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false